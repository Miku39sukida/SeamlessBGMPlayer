<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 无缝循环播放器</title>
<link rel="preload" href="/static/JA-JP.TTF" as="font" type="font/ttf" crossorigin>
<link rel="stylesheet" href="/static/style.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .login-card {
    width: 100%; max-width: 420px;
    padding: 36px 32px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 22px;
    box-shadow: 0 12px 40px rgba(180,120,200,0.2);
    backdrop-filter: blur(10px);
  }
  .login-card h1 {
    text-align:center;
    font-size:22px;
    margin-bottom:8px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight:800;
  }
  .login-card .sub { text-align:center; color:var(--text-light); font-size:13px; margin-bottom:24px; }
  .form-group { margin-bottom:18px; }
  .form-group label { display:block; margin-bottom:8px; font-size:13px; color:var(--text-light); font-weight:600; }
  .form-group input {
    width:100%; padding:12px 14px; font-size:15px;
    border:1px solid rgba(255,180,210,0.35);
    border-radius:12px;
    background: rgba(255,255,255,0.8);
    outline:none; transition:all 0.2s;
    font-family:inherit; color:var(--text);
  }
  .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,110,170,0.15); }
  .error-msg { min-height:18px; color:var(--danger); font-size:13px; text-align:center; margin-bottom:10px; font-weight:600; }
  .login-btn { width:100%; padding:13px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color:white; border:none; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.2s; box-shadow:0 4px 0 rgba(180,80,130,0.15); }
  .login-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow:0 6px 12px rgba(255,110,170,0.3); }
  .login-btn:disabled { opacity:0.6; cursor: not-allowed; }
  .footer { margin-top:22px; text-align:center; font-size:12px; color:var(--text-light); }
  .footer a { color:var(--primary); text-decoration:none; font-weight:600; }
</style>
</head>
<body>
<div class="login-card">
  <h1>🔐 管理员登录</h1>
  <div class="sub">请输入密码进入配置管理</div>
  <div class="form-group">
    <label>密码</label>
    <input type="password" id="pwdInput" placeholder="请输入密码..." autocomplete="current-password" autofocus>
  </div>
  <div class="error-msg" id="errMsg"></div>
  <button class="login-btn" id="loginBtn">登 录</button>
  <div class="footer"><a href="/">← 返回播放主页</a></div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const showErr = (m) => { $('errMsg').textContent = m || ''; };

async function doLogin() {
  const pwd = $('pwdInput').value;
  if (!pwd.trim()) { showErr('请输入密码'); return; }
  $('loginBtn').disabled = true;
  showErr('');
  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    const data = await r.json();
    if (data.ok) {
      window.location.href = data.data.redirect || '/admin';
    } else {
      showErr(data.error || '登录失败');
      $('pwdInput').select();
    }
  } catch (e) {
    showErr('网络错误：' + e.message);
  } finally {
    $('loginBtn').disabled = false;
  }
}

$('loginBtn').addEventListener('click', doLogin);
$('pwdInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
