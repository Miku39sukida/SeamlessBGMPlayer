<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无缝循环播放器</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app">
    <header class="app-header">
        <div class="header-left">
            <button id="drawerToggle" class="hamburger-btn" aria-label="打开曲目列表" title="曲目列表">☰</button>
            <h1 class="title">🎵 无缝循环播放器</h1>
        </div>
        <div class="header-actions">
            <button id="lanBtn" class="btn btn-secondary" title="局域网访问">📱</button>
            <button id="desktopLyricBtn" class="btn btn-secondary desktop-lyric-btn" title="桌面歌词" style="display:none;">🖥</button>
            <button id="stopBtn" class="btn btn-danger" title="停止播放">⏹ 停止</button>
        </div>
    </header>

    <main class="main-content">
        <div class="drawer-overlay" id="drawerOverlay" aria-hidden="true"></div>
        <section class="player-panel">
            <div class="track-info">
                <div class="track-name" id="trackName">--</div>
                <div class="track-meta">
                    <span id="trackBpm">BPM: --</span>
                    <span id="trackSig">拍号: --</span>
                </div>
            </div>

            <div class="lyric-panel" id="lyricPanel" title="点击查看滚动歌词">
                <div class="lyric-label">歌词</div>
                <div class="lyric-text" id="lyricText">暂无歌词</div>
            </div>

            <div class="beat-display">
                <div class="beat-row">
                    <label>当前小节:拍</label>
                    <div class="beat-value" id="curBeat">0:0</div>
                </div>
                <div class="beat-row">
                    <label>当前位置(ms)</label>
                    <div class="beat-value mono" id="curMs">0</div>
                </div>
                <div class="beat-row">
                    <label>当前位置(s)</label>
                    <div class="beat-value mono" id="curSec">0.000</div>
                </div>
            </div>

            <div class="loop-info">
                <div class="loop-row">
                    <span class="loop-label">循环起点</span>
                    <span class="loop-val" id="loopStartInfo">--:--</span>
                </div>
                <div class="loop-row">
                    <span class="loop-label">循环终点</span>
                    <span class="loop-val" id="loopEndInfo">--:--</span>
                </div>
                <div class="loop-row">
                    <span class="loop-label">循环长度</span>
                    <span class="loop-val mono" id="loopLenInfo">0.000s</span>
                </div>
                <div class="loop-row" id="jumpSegInfo" style="display:none;">
                    <span class="loop-label">跳转段</span>
                    <span class="loop-val">--:-- → --:--</span>
                </div>
            </div>

            <div class="progress-wrap">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                    <div class="marker marker-loop-start" id="markerLoopStart" title="循环起点"></div>
                    <div class="marker marker-loop-end" id="markerLoopEnd" title="循环终点"></div>
                    <div class="marker marker-fade-out" id="markerFadeOut" style="display:none;" title="淡出起点"></div>
                    <div class="marker marker-jump-seg" id="markerJumpSegStart" style="display:none;" title="跳转段起点"></div>
                    <div class="marker marker-jump-seg-end" id="markerJumpSegEnd" style="display:none;" title="跳转段终点"></div>
                </div>
                <div class="progress-labels">
                    <span id="progressStart">0:00.000</span>
                    <span id="progressEnd">0:00.000</span>
                </div>
            </div>

            <div class="controls">
                <div class="volume-wrap">
                    <label>🔊</label>
                    <input type="range" id="volumeSlider" min="0" max="100" value="100">
                    <span id="volumeVal">100</span>
                </div>
            </div>

            <div class="beat-flash">
                <div class="flash-dot" id="flashDot1"></div>
                <div class="flash-dot" id="flashDot2"></div>
                <div class="flash-dot" id="flashDot3"></div>
                <div class="flash-dot" id="flashDot4"></div>
            </div>
        </section>

        <section class="track-list-panel">
            <div class="panel-header">
                <h2>曲目列表</h2>
                <div class="panel-actions">
                    <button id="drawerClose" class="btn btn-small btn-danger drawer-close" aria-label="关闭曲目列表" title="关闭">✕</button>
                    <button id="addBtn" class="btn btn-small btn-primary" title="添加曲目">+</button>
                </div>
            </div>
            <div class="scroll-container">
                <div class="track-list" id="trackList"></div>
            </div>
        </section>
    </main>
</div>

<div class="lan-modal" id="lanModal" style="display:none;">
    <div class="lan-modal-overlay" id="lanModalOverlay"></div>
    <div class="lan-modal-content">
        <div class="lan-modal-header">
            <h3>📱 局域网访问</h3>
            <button class="btn btn-small btn-danger" id="lanModalClose">✕</button>
        </div>
        <div class="lan-modal-body">
            <div class="lan-qr" id="lanQr">
                <div class="lan-qr-placeholder">加载中...</div>
            </div>
            <div class="lan-ip-list" id="lanIpList">
                <div class="lan-ip-item">加载中...</div>
            </div>
            <p class="lan-tip">同一 WiFi / 热点下的设备扫码或输入地址访问</p>
        </div>
    </div>
</div>

<footer class="app-footer">
    <div class="footer-content">
        <div class="footer-author">
            <span>作者：</span>
            <a href="https://space.bilibili.com/592777997" target="_blank" rel="noopener noreferrer">ボーカロイド大好き</a>
        </div>
        <div class="footer-links">
            <a href="https://github.com/Miku39sukida/Electron-Web-Browser" target="_blank" rel="noopener noreferrer">Electron 网页浏览器</a>
            <span class="footer-divider">·</span>
            <span>这工具不仅能浏览网页，还能实现桌面歌词，支持卡拉OK逐字高亮、系统字体自定义、描边效果</span>
        </div>
    </div>
</footer>

<script src="/static/beat-utils.js"></script>
<script src="/static/qrcode.min.js"></script>
<script src="/static/app.js"></script>
</body>

<div class="lyric-modal-overlay" id="lyricModalOverlay" aria-hidden="true">
    <div class="lyric-modal">
        <div class="lyric-modal-header">
            <h3 id="lyricModalTitle">歌词</h3>
            <div class="lyric-modal-header-right">
                <label class="color-picker-label">高亮颜色</label>
                <input type="color" id="lyricColorPicker" value="#66CCFF" aria-label="歌词高亮颜色">
                <button id="lyricModalClose" class="btn btn-small btn-danger" aria-label="关闭歌词弹窗">✕</button>
            </div>
        </div>
        <div class="lyric-scroll-container" id="lyricScrollContainer">
            <div class="lyric-scroll-list" id="lyricScrollList"></div>
        </div>
    </div>
</div>
</html>
